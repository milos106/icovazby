name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      # NOTE: tsc --noEmit zatím vypnuto — starší kód má strict-null TODO,
      # tsup build je permissive a prochází. Po cleanupu zapnout zpět.

      - name: Test (vitest)
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify SPDX headers on changed TS files
        run: |
          # Pojistka: každý nový/změněný .ts musí mít SPDX hlavičku
          MISSING=$(find src tests -name "*.ts" -type f \
            -exec sh -c 'head -1 "$1" | grep -q "SPDX-License-Identifier" || echo "$1"' _ {} \;)
          if [ -n "$MISSING" ]; then
            echo "::error::Soubory bez SPDX hlavičky:"
            echo "$MISSING"
            exit 1
          fi
