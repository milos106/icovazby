<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg">
  <!-- Concept D: Monogram „iv" — stylizované propojené písmeno I a V.
       Minimalistický, hodí se jako favicon i full size. -->
  <rect width="240" height="240" fill="white"/>
  <!-- Zelený zaoblený rounded-square podklad (jako brand-mark v PDF reportu) -->
  <rect x="20" y="20" width="200" height="200" rx="36" ry="36" fill="#10b981"/>
  <!-- Vnitřní gradient hloubky -->
  <rect x="20" y="20" width="200" height="200" rx="36" ry="36" fill="url(#gd)" opacity="0.4"/>
  <defs>
    <linearGradient id="gd" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Písmeno „i" -->
  <circle cx="92" cy="70" r="11" fill="white"/>
  <rect x="82" y="90" width="20" height="100" rx="4" fill="white"/>
  <!-- Písmeno „V" -->
  <path d="M 120 90 L 150 190 L 180 90"
        stroke="white" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
